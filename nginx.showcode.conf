# ShowCode nginx 配置 - 放到 /etc/nginx/sites-available/showcode 并软链到 sites-enabled
# 部署流程见 README "迁移部署" 章节

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # ShowCode 静态页面根目录（迁移时改这里）
    root /showcode;
    index index.html;

    # 所有业务接口（projects / save / suggestions / chat）→ server.py:3000
    # server.py 内部再转发到 LLM upstream，见 server.py 的 UPSTREAM_LLM
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}