# ShowCode nginx 配置 - 放到 /etc/nginx/sites-available/showcode 并软链到 sites-enabled
# 部署流程见 README "迁移部署" 章节

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # ShowCode 静态页面根目录（迁移时改这里）
    root /showcode;
    index index.html;

    # ShowCode AI API → 后端 LLM（按需修改 upstream）
    location /v1/ {
        proxy_pass http://127.0.0.1:8104/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # ShowCode 保存接口 → server.py:3000（业务后端）
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}